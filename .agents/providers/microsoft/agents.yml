# Azure AI Agent / Semantic Kernel configuration
#
# Maps canonical agent IDs from .agents/registry/agents.v1.yml to
# Azure AI Foundry deployments or Semantic Kernel plugin configurations.
#
# Usage:
#   - Azure AI Foundry: reference these configs when creating agents via
#     the Azure AI Studio portal or the azure-ai-projects SDK.
#   - Semantic Kernel: use the plugin_class fields to wire kernel plugins.
#
# Keep model deployments in sync with your Azure AI Foundry project.

schema_version: "1.0"

default_deployment_region: eastus2

model_deployments:
  # Lightweight coordination models
  cheap_router: "gpt-4o-mini"
  cheap_text: "gpt-4o-mini"
  # Balanced reasoning for implementation agents
  balanced_reasoning: "gpt-4o"
  # Deep reasoning for architecture and threat modelling
  top_reasoning: "o3-mini"

agents:
  - registry_id: orchestrator
    azure_agent_name: "Orchestrator"
    model_tier: cheap_router
    instructions_file: .agents/prompts/orchestrator/system.md
    tools:
      - type: file_search
    tags:
      stream: orchestration

  - registry_id: speckit-requirements
    azure_agent_name: "Spec Kit Requirements"
    model_tier: cheap_text
    instructions_file: .agents/prompts/speckit-requirements/system.md
    tools:
      - type: file_search
    tags:
      stream: orchestration

  - registry_id: architect
    azure_agent_name: "Architecture"
    model_tier: top_reasoning
    instructions_file: .agents/prompts/architect/system.md
    tools:
      - type: file_search
      - type: code_interpreter
    tags:
      stream: app

